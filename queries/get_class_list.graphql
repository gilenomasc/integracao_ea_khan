query getClassList {
  coach: user {
    id
    nickname
    studentLists: coachedClassrooms {
      name
      id
      signupCode
      cacheId
      key
      descriptor
      autoGenerated
      createdOn
      googleClassId
      googleClassName
      countStudents
      hasAssignments
      hasCourseMasteryGoals: hasCourseMasteryAssignments(filter: NO_KMAP)
      hasMasteryAssignments(filters: NO_KMAP)
      classroomDistrictInfo {
        id
        isNweaMapSynced
        courseSISName
        studentUserDistrictInfos {
          id
          isActivated
          __typename
        }
        district {
          id
          hasKadSelfServe
          isCentrallyRostered
          schoolYearStart
          schoolYearEnd
          __typename
        }
        school {
          id
          eduOrg {
            id
            name
            country
            postalCode
            administrativeAreaLevel1
            administrativeAreaLevel2
            locality
            __typename
          }
          __typename
        }
        teacherDirectedGrade {
          id
          name
          __typename
        }
        hasKadTrial
        hasKadSelfServe
        isManuallyUnmarked
        classWillBeRemovedInDays
        __typename
      }
      topics {
        id
        key
        slug
        title: translatedTitle
        translatedStandaloneTitle
        iconPath
        domainSlug
        isHighSchoolSubject
        masteryEnabled
        subjectMasteryEnabled
        learnableContentSummary {
          countExercises
          __typename
        }
        __typename
      }
      isK4dClassroom
      isKmapClassroom
      isKacPilotClassroom
      isCleverLibrarySynced
      isUpgradedClassroom
      includesCentrallyOwnedDistrictData
      invitations {
        id
        accepted
        __typename
      }
      coachRequests {
        id
        __typename
      }
      isChildAssignmentsClassroom
      __typename
    }
    schoolAffiliation {
      id
      name
      country
      postalCode
      administrativeAreaLevel1
      administrativeAreaLevel2
      locality
      __typename
    }
    hasPartnershipSchoolAffiliation
    hasAccessToAIGuideTeacher
    affiliationCountryCode
    isAIGuideEnabled
    isKmapTeacher
    isK4dTeacher
    includesCentrallyOwnedDistrictData
    userDistrictInfos {
      id
      activatedAt
      rosterSource
      hasKadTrial
      hasKadSelfServe
      primaryRole
      district {
        id
        name
        schools(administeredOnly: false) {
          id
          __typename
        }
        __typename
      }
      schools {
        id
        name
        __typename
      }
      __typename
    }
    isFormalTeacher
    __typename
  }
  user {
    id
    tosForFormalTeacherStatus
    __typename
  }
}
